<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AED ⇄ MMK Money Converter</title>

<style>
body{
    font-family:Arial;
    max-width:400px;
    margin:40px auto;
    padding:20px;
}

input,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    font-size:18px;
}

#result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}
</style>



<script>
const rates = {
    aedToMmk: 1149,
    mmkToAed: 1205
};

function convert(amount, from, to) {
    if (from === "AED" && to === "MMK") {
        return amount * rates.aedToMmk;
    }

    if (from === "MMK" && to === "AED") {
        return amount / rates.mmkToAed;
    }

    throw new Error("Unsupported currency conversion");
}

// Examples
console.log(convert(100, "AED", "MMK"));    // 114900
console.log(convert(120500, "MMK", "AED")); // 100

</script>

</body>
</html>
