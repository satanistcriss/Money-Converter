<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AED ⇄ MMK Money Converter</title>

<style>
body{
    font-family:Arial;
    max-width:400px;
    margin:40px auto;
    padding:20px;
}

input,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    font-size:18px;
}

#result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}
</style>



<script>
// Exchange rates
const AED_TO_MMK_RATE = 1149; // 1 AED = 1149 MMK
const MMK_TO_AED_RATE = 1205; // 1 AED = 1205 MMK (used when converting MMK back to AED)

// AED -> MMK
function aedToMmk(aed) {
    return aed * AED_TO_MMK_RATE;
}

// MMK -> AED
function mmkToAed(mmk) {
    return mmk / MMK_TO_AED_RATE;
}

// Examples
console.log("100 AED =", aedToMmk(100), "MMK");      // 114900 MMK
console.log("120500 MMK =", mmkToAed(120500), "AED"); // 100 AED

</script>

</body>
</html>
