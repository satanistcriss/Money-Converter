<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AED ⇄ MMK Money Converter</title>

<style>
body{
    font-family:Arial;
    max-width:400px;
    margin:40px auto;
    padding:20px;
}

input,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    font-size:18px;
}

#result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}
</style>

</head>
<body>

<h2>AED ⇄ MMK Converter</h2>

<input type="number" id="amount" placeholder="Enter Amount">

<button onclick="aedToMmk()">AED → MMK</button>

<button onclick="mmkToAed()">MMK → AED</button>

<div id="result"></div>

<script>

// Two different exchange rates
const aedToMmkRate = 1149;  
const amount = 100;
const mmkToAedRate = 1205;   
const amount = 100;

function aedToMmk(){

    let amount = Number(document.getElementById("amount").value);

    let result = amount * aedToMmkRate;

    document.getElementById("result").innerHTML =
        amount + " AED = " +
        result.toLocaleString() +
        " MMK";

}

function mmkToAed(){

    let amount = Number(document.getElementById("amount").value);

    let result = amount / mmkToAedRate;
    

    document.getElementById("result").innerHTML =
        amount + " MMK = " +
        result.toFixed(2) +
        " AED";

}

</script>

</body>
</html>
